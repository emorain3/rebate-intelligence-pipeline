version: 2

models:
  - name: dim_partners
    description: "Gold dimension table consolidating clean, standardized partner details."
    columns:
      - name: partner_id
        description: "Primary key identifier for the partner."
        tests:
          - unique
          - not_null
      - name: partner_name
        description: "Cleaned and standardized partner name."
      - name: partner_type
        description: "The business tier or classification type of the partner."

  - name: fact_rebate_payouts
    description: "Gold fact table containing validated, deduplicated rebate transactions cleared of all flagged anomalies."
    columns:
      - name: rebate_payout_id
        description: "Primary key hash for the individual transaction payout."
        tests:
          - unique
          - not_null
      - name: partner_id
        description: "Foreign key linking the payout transaction to its verified partner dimension."
        tests:
          - not_null
          - relationships:
              to: ref('dim_partners')  
              field: partner_id     
      - name: affiliate_id
        description: "Identifier for the individual affiliate location that generated the transaction."
        tests:
          - not_null

  - name: mart_affiliate_summary
    description: "Analytical summary mart evaluating transaction health and explicitly identifying silent shop entities among other anomalies."
    columns:
      - name: affiliate_id
        description: "Primary key grouping column for individual affiliates."
        tests:
          - unique
          - not_null
      - name: affiliate_name
        description: "Standardized name of the affiliate location."
      - name: state
        description: "Geographic state abbreviation of the affiliate."
      - name: program_tier
        description: "Contractual program tier assigned to the location."
      - name: partner_name
        description: "Associated partner name resolved via active transactions."
      - name: is_silent_shop
        description: "Flag indicating whether the location has generated zero clean transactions."