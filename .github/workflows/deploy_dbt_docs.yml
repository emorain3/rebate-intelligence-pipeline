name: Deploy dbt Docs to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Forces the runner to execute inside your subfolder and builds the data profile
      - name: Install Dependencies & Generate Docs
        run: |
          pip install dbt-snowflake
          dbt deps
          dbt docs generate --profiles-dir .
        working-directory: rebate_transformation_layer
        env:
          DBT_ENV_SECRET_ACCOUNT: ${{ secrets.DBT_ENV_SECRET_ACCOUNT }}
          DBT_ENV_SECRET_USER: ${{ secrets.DBT_ENV_SECRET_USER }}
          DBT_ENV_SECRET_PASSWORD: ${{ secrets.DBT_ENV_SECRET_PASSWORD }}
          DBT_ENV_SECRET_ROLE: ${{ secrets.DBT_ENV_SECRET_ROLE }}
          DBT_ENV_SECRET_WAREHOUSE: ${{ secrets.DBT_ENV_SECRET_WAREHOUSE }}

      # Deploys the entire target directory so index.html, manifest.json, and catalog.json stay together
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: rebate_transformation_layer/target